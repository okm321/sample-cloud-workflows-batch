# child: データ準備B
# サンプル用に sys.log で代替 (本番では googleapis.run.v1.namespaces.jobs.run を呼ぶ)
main:
  params: [args]
  steps:
    - maybe_fail:
        switch:
          - condition: ${args != null and "should_fail" in args and args.should_fail}
            raise: data-prep-b intentionally failed
    - run:
        call: sys.log
        args:
          severity: INFO
          text: data-prep-b executed
